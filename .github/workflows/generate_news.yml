name: Daily News Intelligence Update

on:
  schedule:
    # 21:00 UTC corresponde a 18:00 no horário de Brasília (UTC-3)
    - cron: '0 21 * * *'
  workflow_dispatch: # Permite rodar o workflow manualmente pela aba Actions do GitHub

jobs:
  update-news:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Permissão de escrita para permitir o push automático no repositório

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run news generator agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python agent/generate_news.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/news/
          # Se não houver nada para comitar, o comando não falhará
          git commit -m "Relatório diário automático: $(date +%Y-%m-%d)" || echo "Nothing to commit"
          git push origin main
